name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  schedule:
    # Rebuild weekly on Monday at 06:00 UTC to pick up latest
    # Debian base image and package security updates
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Keep the repository active so GitHub doesn't disable scheduled workflows
  # after 60 days of inactivity. Commits a timestamp file on scheduled runs.
  keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update last-rebuild timestamp
        run: |
          date -u '+%Y-%m-%dT%H:%M:%SZ' > .github/last-scheduled-rebuild
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/last-scheduled-rebuild
          git diff --cached --quiet && exit 0
          git commit -m "ci: record scheduled rebuild at $(cat .github/last-scheduled-rebuild)"
          git push

  build:
    needs: [keepalive]
    if: always() && (needs.keepalive.result == 'success' || needs.keepalive.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'schedule' && 'main' || '' }}
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Skip cache on scheduled builds to ensure fresh base image and packages
          cache-from: ${{ github.event_name != 'schedule' && 'type=gha' || '' }}
          cache-to: type=gha,mode=max
